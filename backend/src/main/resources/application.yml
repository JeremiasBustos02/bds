spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mitienda}
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  devtools:
    restart:
      enabled: true

server:
  port: 8080
