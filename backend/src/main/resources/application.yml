spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mitienda}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  devtools:
    restart:
      enabled: true

server:
  port: 8080
